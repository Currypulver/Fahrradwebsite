# Deployt die statische Seite bei jedem Push auf main zu GitHub Pages.
# Die Seite ist danach unter https://currypulver.github.io/Fahrradwebsite/
# erreichbar – bzw. unter der eigenen Domain, sobald sie in den
# Repo-Einstellungen (Settings → Pages → Custom domain) hinterlegt ist.
name: Deploy zu GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: GitHub Pages konfigurieren (aktiviert Pages beim ersten Lauf)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Seite als Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Zu GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
